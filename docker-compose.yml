volumes:
  auth_data:
  redis_data:
  orgs_data:

networks:
  auth-net:
    driver: bridge
  orgs-net:
    driver: bridge

services:
  # AUTH SERVICE
  auth-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/postgres?sslmode=disable
      SECURITY_KEY: "your_jwt_security_key_here"
      SPICEDB_ADDRESS: spice:50051
      SPICEDB_API_KEY: somerandomkey
    depends_on:
      - auth-db
      - spice
    networks:
      - auth-net
  # AUTH SERVICE DATABASE
  auth-db:
    networks:
      - auth-net
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data
    volumes:
      - auth_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  # SPICE for permissions
  spice:
    image: quay.io/authzed/spicedb:latest
    depends_on:
      - auth-db
      - spice-migrate
    restart: unless-stopped
    command: serve
    ports:
      - "50051:50051"
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: somerandomkey
      SPICEDB_LOG_LEVEL: debug
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://postgres:postgres@auth-db:5432/postgres?sslmode=disable
    networks:
      - auth-net
  # SPICE MIGRATION
  spice-migrate:
    image: quay.io/authzed/spicedb:latest
    depends_on:
      - auth-db
    command: migrate head
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: somerandomkey
      SPICEDB_LOG_LEVEL: debug
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: postgres://postgres:postgres@auth-db:5432/postgres?sslmode=disable
    networks:
      - auth-net
